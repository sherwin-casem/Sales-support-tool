services:
  postgres:
    image: postgres:16-alpine
    container_name: sales-intelligence-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sales
      POSTGRES_PASSWORD: sales
      POSTGRES_DB: sales_intelligence
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales -d sales_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
